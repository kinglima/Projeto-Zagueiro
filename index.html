<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TITAN">
<meta name="theme-color" content="#070910">
<title>TITAN</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#070910;--s1:#0c0f18;--s2:#10141f;--card:#131827;
  --border:#1c2438;--border2:#263047;
  --gold:#f0c040;--gold2:#a07820;--gold-bg:rgba(240,192,64,.07);
  --red:#e04545;--green:#3dcc84;--blue:#4da8f0;--purple:#9b7fe8;--orange:#f07830;
  --text:#e8ecf4;--muted:#4a5470;--muted2:#7a85a0;
  --nav-h:64px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;}
/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100%;height:100dvh;}
.header{background:var(--s1);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.12em;color:var(--gold);}
.header-day{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
.header-pct{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text);}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 14px calc(var(--nav-h) + var(--safe-bottom) + 14px);-webkit-overflow-scrolling:touch;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bottom));background:var(--s1);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;padding-bottom:var(--safe-bottom);z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 2px;border:none;background:none;color:var(--muted);transition:color .2s;}
.nav-item.active{color:var(--gold);}
.nav-icon{font-size:20px;line-height:1;}
.nav-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.card-hdr{padding:13px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.card-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--text);}
.card-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.card-chk{margin-left:auto;width:28px;height:28px;border-radius:7px;border:2px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;flex-shrink:0;transition:all .2s;}
.card-chk.done{background:var(--green);border-color:var(--green);color:#fff;}
.card-body{padding:8px 14px 12px;}
/* ── EX ITEMS ── */
.ex{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;active:opacity:.7;}
.ex:last-child{border-bottom:none;}
.ex-cb{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;transition:all .15s;}
.ex.done .ex-cb{background:var(--green);border-color:var(--green);}
.ex.done .ex-nm{text-decoration:line-through;color:var(--muted);}
.ex-info{flex:1;}
.ex-nm{font-size:13px;color:var(--text);line-height:1.3;}
.ex-sets{font-size:11px;color:var(--muted);margin-top:2px;}
/* ── HOJE HEADER ── */
.hoje-bar{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.hoje-date{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);line-height:1;}
.hoje-desc{font-size:11px;color:var(--muted);margin-top:2px;}
.prog-wrap{text-align:right;}
.prog-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text);line-height:1;}
.prog-bar{width:70px;height:5px;background:var(--border2);border-radius:3px;overflow:hidden;margin-top:4px;margin-left:auto;}
.prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s;}
/* ── REST DAY ── */
.rest{text-align:center;padding:40px 20px;}
.rest-icon{font-size:52px;display:block;margin-bottom:12px;}
.rest-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text);margin-bottom:6px;}
.rest-sub{font-size:13px;color:var(--muted);line-height:1.6;}
/* ── BADGES ── */
.badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;margin-left:4px;text-transform:uppercase;letter-spacing:.04em;vertical-align:middle;}
.b-fisio{background:rgba(77,168,240,.12);color:var(--blue);}
.b-ft{background:rgba(240,192,64,.12);color:var(--gold);}
.b-func{background:rgba(155,127,232,.12);color:var(--purple);}
/* ── STATS GRID ── */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold);line-height:1;}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.stats3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
/* ── FORMS ── */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.field label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.fi{background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:11px 13px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;outline:none;width:100%;transition:border .2s;-webkit-appearance:none;}
.fi:focus{border-color:var(--gold);}
select.fi{cursor:pointer;}
textarea.fi{resize:vertical;min-height:80px;}
.btn{display:block;width:100%;padding:13px;border-radius:9px;border:none;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:4px;}
.btn-gold{background:var(--gold);color:#000;}
.btn-gold:active{background:#f8d060;transform:scale(.98);}
.btn-red{background:rgba(224,69,69,.12);border:1px solid rgba(224,69,69,.25);color:var(--red);}
/* ── MATCH ENTRIES ── */
.match-entry{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;}
.m-date{text-align:center;flex-shrink:0;}
.m-date-d{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);line-height:1;}
.m-date-m{font-size:9px;color:var(--muted);text-transform:uppercase;}
.m-info{flex:1;min-width:0;}
.m-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;}
.m-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;}
.m-note{font-size:12px;color:var(--muted2);margin-top:5px;font-style:italic;line-height:1.5;word-break:break-word;}
.m-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;flex-shrink:0;}
/* ── CHECKLIST DAILY ── */
.daily-check{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;}
.daily-check:last-child{border-bottom:none;}
.dc-cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;transition:all .2s;}
.daily-check.done .dc-cb{background:var(--green);border-color:var(--green);}
.daily-check.done .dc-label{text-decoration:line-through;color:var(--muted);}
.dc-icon{font-size:20px;flex-shrink:0;}
.dc-label{font-size:14px;color:var(--text);flex:1;}
/* ── FISIO LOG ── */
.fli{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.fli:last-child{border-bottom:none;}
.fli-date{font-size:12px;font-weight:700;color:var(--gold);width:75px;flex-shrink:0;}
.fli-area{flex:1;font-size:12px;color:var(--text);}
.fli-tag{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:700;}
.fls-ok{background:rgba(61,204,132,.12);color:var(--green);}
.fls-skip{background:rgba(224,69,69,.12);color:var(--red);}
/* ── PAIN DOTS ── */
.pain-row{display:flex;gap:8px;margin-top:8px;}
.pd{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border2);color:var(--muted);background:var(--s1);transition:all .15s;}
.pd.sel{transform:scale(1.15);box-shadow:0 0 8px currentColor;}
.pd.p0{color:var(--green);}.pd.p1{color:#a8d060;}.pd.p2{color:var(--gold);}.pd.p3{color:#e07840;}.pd.p4{color:var(--red);}
/* ── INJURY CHIPS ── */
.inj-chips{display:flex;gap:8px;margin-bottom:12px;}
.inj-chip{flex:1;padding:10px 6px;border-radius:8px;text-align:center;border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);transition:all .2s;}
.inj-chip.ok{background:rgba(61,204,132,.12);border-color:rgba(61,204,132,.3);color:var(--green);}
.inj-chip.warn{background:rgba(240,192,64,.1);border-color:var(--gold2);color:var(--gold);}
.inj-chip.pain{background:rgba(224,69,69,.12);border-color:rgba(224,69,69,.3);color:var(--red);}
.inj-advice{font-size:12px;color:var(--muted2);padding:10px;background:var(--s2);border-radius:8px;line-height:1.6;margin-bottom:12px;}
/* ── BOXE ── */
.boxe-item{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:13px;margin-bottom:9px;}
.boxe-num{font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.boxe-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;}
.boxe-desc{font-size:12px;color:var(--muted2);line-height:1.6;}
/* ── LIVROS ── */
.book{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:13px;margin-bottom:9px;}
.book-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--text);}
.book-author{font-size:11px;color:var(--blue);margin:2px 0 5px;}
.book-desc{font-size:12px;color:var(--muted2);line-height:1.5;}
/* ── SECTION TITLE ── */
.sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);margin:16px 0 8px;padding-left:2px;}
/* ── EMPTY ── */
.empty{text-align:center;padding:36px 16px;color:var(--muted);}
.empty-icon{font-size:40px;display:block;margin-bottom:10px;}
/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 12px);left:14px;right:14px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.5);transform:translateY(14px);opacity:0;transition:all .3s;z-index:999;pointer-events:none;display:flex;align-items:center;gap:8px;}
.toast.show{transform:translateY(0);opacity:1;}
/* ── SCROLL ── */
::-webkit-scrollbar{width:0;height:0;}
/* ── MACRO BARS ── */
.macro-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.macro-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted2);width:75px;flex-shrink:0;}
.macro-track{flex:1;height:6px;background:var(--border2);border-radius:3px;overflow:hidden;}
.macro-fill{height:100%;border-radius:3px;}
.macro-val{font-family:'Bebas Neue',sans-serif;font-size:16px;width:42px;text-align:right;}
/* ── SECTION TABS ── */
.stabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.stab{padding:7px 14px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border:1px solid var(--border);background:transparent;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s;}
.stab.active{color:var(--gold);border-color:var(--gold);background:var(--gold-bg);}
/* ── INFO BANNERS ── */
.info-b{background:rgba(77,168,240,.06);border:1px solid rgba(77,168,240,.18);border-radius:8px;padding:11px 13px;font-size:12px;color:var(--muted2);line-height:1.6;margin-bottom:12px;}
.info-b strong{color:var(--blue);}
.warn-b{background:rgba(240,192,64,.06);border:1px solid var(--gold2);border-radius:8px;padding:11px 13px;font-size:12px;color:var(--muted2);line-height:1.6;margin-bottom:12px;}
.warn-b strong{color:var(--gold);}
.ok-b{background:rgba(61,204,132,.06);border:1px solid rgba(61,204,132,.2);border-radius:8px;padding:11px 13px;font-size:12px;color:var(--muted2);line-height:1.6;margin-bottom:12px;}
.ok-b strong{color:var(--green);}
/* ── FUNCIONAL ITEMS ── */
.func-item{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:12px 13px;margin-bottom:8px;}
.func-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px;}
.func-desc{font-size:12px;color:var(--muted2);line-height:1.5;}
.func-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;margin-bottom:6px;display:inline-block;}
.ft-vel{background:rgba(77,168,240,.12);color:var(--blue);}
.ft-exp{background:rgba(224,69,69,.12);color:var(--red);}
.ft-mob{background:rgba(61,204,132,.12);color:var(--green);}
.ft-tec{background:rgba(240,192,64,.12);color:var(--gold);}
.ft-est{background:rgba(155,127,232,.12);color:var(--purple);}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-title">TITAN</div>
      <div class="header-day" id="hdr-day">—</div>
    </div>
    <div style="text-align:right;">
      <div class="header-pct" id="hdr-pct">—</div>
      <div style="font-size:10px;color:var(--muted);">hoje</div>
    </div>
  </div>

  <div class="content" id="content"></div>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="goTo('hoje')" id="nav-hoje">
      <span class="nav-icon">📋</span><span class="nav-label">Hoje</span>
    </button>
    <button class="nav-item" onclick="goTo('treino')" id="nav-treino">
      <span class="nav-icon">🏋️</span><span class="nav-label">Treino</span>

    <button class="nav-item" onclick="goTo('jogo')" id="nav-jogo">

    <button class="nav-item" onclick="goTo('mais')" id="nav-mais">
      <span class="nav-icon">⋯</span><span class="nav-label">Mais</span>
    </button>
  </nav>
</div>

<div id="toast" class="toast"><span id="ti"></span><span id="tm"></span></div>

<script>

const save=()=>localStorage.setItem('titan_mob',JSON.stringify(S));

// ── TRAINING DATA ──
const DAYS=[

  {id:'sab',name:'Treino E',sub:'Posterior · Glúteo · Core',day:'Sábado',exs:[

// ── NAV ──
let currentPage='hoje';
let currentSubTab={};

function goTo(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById('nav-'+page);
  if(el)el.classList.add('active');
  render();
}

function getToday(){
  const d=new Date();
  return {dow:d.getDay(),key:d.toISOString().split('T')[0],d};
}
function getTodayKey(){return 'hoje_'+getToday().key;}

// ── RENDER ROUTER ──
function render(){
  const c=document.getElementById('content');
  if(currentPage==='hoje')renderHoje(c);
  else if(currentPage==='treino')renderTreino(c);
  else if(currentPage==='jogo')renderJogo(c);
  else if(currentPage==='saude')renderSaude(c);
  else if(currentPage==='mais')renderMais(c);
  updateHeader();
}

function updateHeader(){
  const {dow,key,d}=getToday();
  const day=DAYS.find(x=>x.id===DOW_MAP[dow]);
  document.getElementById('hdr-day').textContent=day?day.day:'—';
  if(currentPage==='hoje'){
    const tk=getTodayKey();
    const checks=S.checks[tk]||{};
    const allExs=[...(day?.exs||[]),...(FUNC[DOW_MAP[dow]]||[]).map((_,i)=>({id:'f'+i})),...DAILY_HABITS.map(h=>({id:'h_'+h.id}))];
    const done=allExs.filter(e=>checks[e.id]).length;
    const pct=allExs.length>0?Math.round(done/allExs.length*100):0;
    document.getElementById('hdr-pct').textContent=pct+'%';
    const bar=document.getElementById('prog-fill-hdr');
    if(bar)bar.style.width=pct+'%';
  } else {
    document.getElementById('hdr-pct').textContent='';
  }
}

// ── HOJE ──
function renderHoje(c){
  const {dow,key}=getToday();
  const dayId=DOW_MAP[dow];
  const day=DAYS.find(x=>x.id===dayId)||DAYS[0];
  const tk=getTodayKey();
  if(!S.checks[tk])S.checks[tk]={};
  const checks=S.checks[tk];

  const d=new Date();
  const dateStr=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}).replace('.','');

  let html='';

  // Header bar
  const habitsDone=DAILY_HABITS.filter(h=>checks['h_'+h.id]).length;
  const gymDone=day.exs.filter(e=>checks[e.id]).length;
  const funcItems=FUNC[dayId]||[];
  const funcDone=funcItems.filter((_,i)=>checks['f'+i]).length;
  const total=DAILY_HABITS.length+day.exs.length+funcItems.length;
  const done=habitsDone+gymDone+funcDone;
  const pct=total>0?Math.round(done/total*100):0;

  html+=`<div class="hoje-bar">
    <div>
      <div class="hoje-date">${dateStr.toUpperCase()}</div>
      <div class="hoje-desc">${day.name} · ${day.sub}</div>
    </div>
    <div class="prog-wrap">
      <div class="prog-num">${pct}%</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
  </div>`;

  if(day.rest){
    html+=`<div class="rest"><span class="rest-icon">😴</span><div class="rest-title">Dia de Descanso</div><div class="rest-sub">Foam roller · Alongamento · Caminhada leve opcional</div></div>`;
    html+=buildCard('🛌','Recuperação Ativa','30 min opcional',day.exs,tk,checks,'rgba(61,204,132,.1)');
  } else {
    // Daily habits
    html+=`<div class="sec">Hábitos do Dia</div>`;
    html+=`<div class="card"><div class="card-body">`;
    html+=DAILY_HABITS.map(h=>`<div class="daily-check${checks['h_'+h.id]?' done':''}" onclick="toggleHabit('${tk}','${h.id}')">
      <div class="dc-cb">${checks['h_'+h.id]?'✓':''}</div>
      <span class="dc-icon">${h.icon}</span>
      <span class="dc-label">${h.label}</span>
    </div>`).join('');
    html+=`</div></div>`;

    // Gym workout
    html+=`<div class="sec">Academia — ${day.name}</div>`;
    html+=buildCard('🏋️',day.name,day.sub,day.exs,tk,checks,'rgba(224,69,69,.1)');

    // Functional training
    if(funcItems.length>0){
      html+=`<div class="sec">Funcional / Casa</div>`;
      html+=`<div class="card"><div class="card-body">`;
      html+=funcItems.map((f,i)=>{
        const done=!!checks['f'+i];
        const tagColors={vel:'b-func',exp:'b-ft',mob:'b-fisio',tec:'b-ft',est:'b-func'};
        return`<div class="ex${done?' done':''}" onclick="toggleFunc('${tk}',${i})">
          <div class="ex-cb">${done?'✓':''}</div>
          <div class="ex-info">
            <div class="ex-nm">${f.title} <span class="badge ${tagColors[f.tag]||''}">${f.label}</span></div>
            <div class="ex-sets">${f.desc}</div>
          </div>
        </div>`;
      }).join('');
      html+=`</div></div>`;
    }

    // Fisio on mon/wed/sat
    if(['seg','qua','sab'].includes(dayId)){
      const phase=S.ankPhase||0;
      const fisioExs=getFisioExs(phase);
      html+=`<div class="sec">Fisioterapia · Tornozelo · Fase ${phase+1}/3</div>`;
      html+=buildCard('🦶','Fisioterapia','Antes do treino · '+fisioExs.length+' exercícios',fisioExs,tk,checks,'rgba(77,168,240,.1)');
    }

    // Neck on mon/thu/sat
    if(['seg','qui','sab'].includes(dayId)){
      const neckExs=[
        {id:'nk0',n:'Flexão frontal',s:'Mão na testa · resiste · 3×15'},
        {id:'nk1',n:'Extensão posterior',s:'Mão na nuca · resiste · 3×15'},
        {id:'nk2',n:'Lateral direita',s:'Mão na têmpora · 3×15'},
        {id:'nk3',n:'Lateral esquerda',s:'Mão na têmpora · 3×15 · mais importante'},
      ];
      html+=`<div class="sec">Pescoço · Piloto · 5 min</div>`;
      html+=buildCard('🏎️','Treino de Pescoço','Fim do treino · 4 movimentos',neckExs,tk,checks,'rgba(155,127,232,.1)');
    }
  }

  c.innerHTML=html;
  updateHeader();
}

function buildCard(icon,title,sub,exs,tk,checks,iconBg){
  const allDone=exs.every(e=>checks[e.id]);
  return`<div class="card">
    <div class="card-hdr">
      <div class="card-icon" style="background:${iconBg}">${icon}</div>
      <div style="flex:1"><div class="card-title">${title}</div><div class="card-sub">${sub}</div></div>
      <div class="card-chk${allDone?' done':''}" onclick="toggleAll('${tk}',${JSON.stringify(exs.map(e=>e.id))},${allDone})">${allDone?'✓':''}</div>
    </div>
    <div class="card-body">
      ${exs.map(e=>{
        const done=!!checks[e.id];
        const badge=e.ft?'<span class="badge b-ft">⚽</span>':e.ank?'<span class="badge b-fisio">🦶</span>':'';
        return`<div class="ex${done?' done':''}" onclick="toggleEx('${tk}','${e.id}')">
          <div class="ex-cb">${done?'✓':''}</div>
          <div class="ex-info">
            <div class="ex-nm">${e.n}${badge}</div>
            <div class="ex-sets">${e.s}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function toggleEx(tk,id){if(!S.checks[tk])S.checks[tk]={};S.checks[tk][id]=!S.checks[tk][id];save();render();}
function toggleAll(tk,ids,allDone){if(!S.checks[tk])S.checks[tk]={};ids.forEach(id=>S.checks[tk][id]=!allDone);save();render();}
function toggleHabit(tk,id){if(!S.checks[tk])S.checks[tk]={};S.checks[tk]['h_'+id]=!S.checks[tk]['h_'+id];save();render();}
function toggleFunc(tk,i){if(!S.checks[tk])S.checks[tk]={};S.checks[tk]['f'+i]=!S.checks[tk]['f'+i];save();render();}

function getFisioExs(p){

      const wk=getWk();
      if(!S.checks[wk])S.checks[wk]={};

      const doneCount=day.exs.filter(e=>dc[e.id]).length;
      return`<div class="card" style="margin-bottom:10px;">
        <div class="card-hdr">
          <div class="card-icon" style="background:${day.rest?'rgba(61,204,132,.1)':day.id==='sex'?'rgba(240,192,64,.1)':'rgba(224,69,69,.1)'}">

          <div style="flex:1">
            <div class="card-title">${day.name}</div>
            <div class="card-sub">${day.day} · ${doneCount}/${day.exs.length} feitos</div>
          </div>
          <div class="card-chk${allDone?' done':''}" onclick="toggleDayAll('${day.id}')">${allDone?'✓':''}</div>
        </div>
        <div class="card-body">
          ${day.exs.map(e=>{
            const done=!!dc[e.id];

  }

    html+=`<div class="ok-b"><strong>Treinos em casa ou na rua.</strong> Sem equipamento. Complementa a academia.</div>`;
    const days2=[
      {id:'seg',label:'Segunda — Velocidade + Pescoço'},
      {id:'ter',label:'Terça — Explosão + Core'},
      {id:'qua',label:'Quarta — Mobilidade'},
      {id:'qui',label:'Quinta — Técnica + Velocidade'},
      {id:'sab',label:'Sábado — Explosão + Estabilidade'},
    ];
    days2.forEach(d=>{
      const items=FUNC[d.id]||[];
      if(!items.length)return;
      html+=`<div class="sec">${d.label}</div>`;
      items.forEach(f=>{
        const tagMap={vel:'ft-vel',exp:'ft-exp',mob:'ft-mob',tec:'ft-tec',est:'ft-est'};
        html+=`<div class="func-item">
          <div class="func-tag ${tagMap[f.tag]||''}">${f.label}</div>
          <div class="func-title">${f.title}</div>
          <div class="func-desc">${f.desc}</div>

  }

  else if(sub==='tornozelo'){
    const phase=S.ankPhase||0;
    html+=`<div class="info-b"><strong>CAI — Instabilidade Crônica.</strong> 3x por semana: Segunda · Quarta · Sábado. Neurodyn FES REC antes dos exercícios.</div>`;

      <div class="stat-card"><div class="stat-num">${phase+1}</div><div class="stat-lbl">Fase atual</div></div>

      <div class="stat-card"><div class="stat-num">${phase*2}</div><div class="stat-lbl">Semanas feitas</div></div>
    </div>`;
    const phases=[
      {name:'Fase 1 — Força com Corda',weeks:'Sem 1–2',exs:['Flexão plantar · 3×15 · 3s','Dorsiflexão · 3×15 · 3s','Inversão · 3×15 · 3s','Eversão · 3×15 · 3s']},
      {name:'Fase 2 — Equilíbrio Estático',weeks:'Sem 3–4',exs:['1 pé olhos abertos · 3×30s','1 pé olhos fechados · 3×20s','Toalha dobrada · 3×30s','Panturrilha excêntrica · 3×15']},
      {name:'Fase 3 — Equilíbrio Dinâmico',weeks:'Sem 5–6',exs:['Hop-to-stabilize · 4×8','Agachamento 1 perna · 3×10','Knee-to-wall · 3×15s','Círculos · 10× cada lado']},
    ];
    phases.forEach((ph,i)=>{
      const active=i===phase,done=i<phase;

  }

  c.innerHTML=html;
}

function setSubTab(page,sub){currentSubTab[page]=sub;render();}
function toggleDayEx(dayId,exId){const wk=getWk();if(!S.checks[wk])S.checks[wk]={};if(!S.checks[wk][dayId])S.checks[wk][dayId]={};S.checks[wk][dayId][exId]=!S.checks[wk][dayId][exId];save();render();}
function toggleDayAll(dayId){const wk=getWk();if(!S.checks[wk])S.checks[wk]={};const day=DAYS.find(d=>d.id===dayId);const dc=S.checks[wk][dayId]||{};const all=day.exs.every(e=>dc[e.id]);S.checks[wk][dayId]={};if(!all)day.exs.forEach(e=>S.checks[wk][dayId][e.id]=true);save();render();}
function resetWeek(){if(!confirm('Resetar semana?'))return;S.checks[getWk()]={};save();render();toast('🔄','Nova semana!');}
function getWk(){const d=new Date(),j=new Date(d.getFullYear(),0,1),w=Math.ceil(((d-j)/86400000+j.getDay()+1)/7);return d.getFullYear()+'-W'+w;}
function advAnk(){S.ankPhase=Math.min((S.ankPhase||0)+1,2);save();render();toast('🦶','Fase concluída!');}

  const avgRating=ms.length?(ms.reduce((s,m)=>s+m.rating,0)/ms.length).toFixed(1):'—';

  let html=`<div class="stats">
    <div class="stat-card"><div class="stat-num">${ms.length}</div><div class="stat-lbl">Sessões</div></div>
    <div class="stat-card"><div class="stat-num">${avgRating}</div><div class="stat-lbl">Nota Média</div></div>

    html+=`<div class="sec">Histórico</div>`;
    html+=ms.map(m=>{
      const d=new Date(m.date+'T12:00:00');
      const wr=m.games>0?Math.round(((m.wins||0)/m.games)*100):0;
      const wc=wr>=50?'var(--green)':wr>=33?'var(--gold)':'var(--red)';
      return`<div class="match-entry">
        <div class="m-date"><div class="m-date-d">${d.getDate()}</div><div class="m-date-m">${d.toLocaleDateString('pt-BR',{month:'short'}).toUpperCase()}</div></div>

          <div class="m-tags">
            <span class="m-tag" style="background:rgba(240,192,64,.12);color:var(--gold);">${m.teams||4} times</span>

        </div>
        <button class="m-del" onclick="deleteMatch(${m.id})">✕</button>
      </div>`;
    }).join('');
  }

  c.innerHTML=html;
  const dateEl=document.getElementById('m-date');
  if(dateEl)dateEl.value=new Date().toISOString().split('T')[0];
}

function saveMatch(){
  const m={id:Date.now(),date:document.getElementById('m-date').value||new Date().toISOString().split('T')[0],teams:parseInt(document.getElementById('m-teams').value)||4,games:parseInt(document.getElementById('m-games').value)||4,wins:parseInt(document.getElementById('m-wins').value)||0,scored:parseInt(document.getElementById('m-scored').value)||0,goals:parseInt(document.getElementById('m-goals').value)||0,duels:parseInt(document.getElementById('m-duels').value)||0,rating:parseFloat(document.getElementById('m-rating').value)||6,notes:document.getElementById('m-notes').value};
  if(!S.matches)S.matches=[];

function deleteMatch(id){if(!confirm('Apagar?'))return;S.matches=S.matches.filter(m=>m.id!==id);save();render();}

function setStatus(s,silent){
  S.injStatus=s;if(!silent)save();
  document.querySelectorAll('.inj-chip').forEach(ch=>{ch.classList.remove('ok','warn','pain');});
  const el=document.getElementById('chip-'+s)||document.querySelector('.inj-chip:nth-child('+(s==='ok'?1:s==='warn'?2:3)+')');
  if(el)el.className='inj-chip '+s;
  const adv=document.getElementById('inj-advice');
  if(adv){const msgs={ok:'✅ Sem dor. Treine normalmente.',warn:'⚠️ Dor leve. Reduz impacto, gelo pós-treino.',pain:'🔴 Com dor. Não treina o músculo. Aplica R.I.C.E.'};adv.textContent=msgs[s]||'';}
}
function setPain(area,val){if(!S.pain)S.pain={};S.pain[area]=val;save();renderSaude(document.getElementById('content'));}
function logFisio(status){if(!S.fisioLog)S.fisioLog=[];const area=document.getElementById('fisio-area')?.value||'tornozelo';S.fisioLog.unshift({id:Date.now(),date:new Date().toISOString().split('T')[0],status,area});save();renderFisioLog();toast(status==='feito'?'✅':'❌',status==='feito'?'Fisio registrada!','Sessão pulada.');}
function renderFisioLog(){
  const el=document.getElementById('fisio-log-list');if(!el)return;
  if(!S.fisioLog||!S.fisioLog.length){el.innerHTML='<div style="font-size:12px;color:var(--muted);padding:8px 0;">Nenhum registro ainda.</div>';return;}
  const names={tornozelo:'Tornozelo',joelho:'Joelho',panturrilha:'Panturrilha',geral:'Geral'};
  const sorted=[...S.fisioLog].sort((a,b)=>b.date.localeCompare(a.date));
  let streak=0;for(const e of sorted){if(e.status==='feito')streak++;else break;}
  const sk=document.getElementById('fisio-streak');if(sk)sk.textContent=streak>0?'🔥 '+streak+' seguidas':'';
  el.innerHTML=sorted.slice(0,10).map(e=>{
    const d=new Date(e.date+'T12:00:00');
    return`<div class="fli"><span class="fli-date">${d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}</span><span class="fli-area">${names[e.area]||e.area}</span><span class="fli-tag ${e.status==='feito'?'fls-ok':'fls-skip'}">${e.status==='feito'?'✅':'❌'}</span></div>`;
  }).join('');
}
function saveBio(){
  const fat=parseFloat(document.getElementById('bio-fat')?.value);
  const muscle=parseFloat(document.getElementById('bio-muscle')?.value);
  if(!fat&&!muscle){toast('❌','Preencha os dados.');return;}
  S.bio={fat,muscle,visceral:parseInt(document.getElementById('bio-visceral')?.value)||null,weight:parseFloat(document.getElementById('bio-weight')?.value)||null,date:new Date().toISOString().split('T')[0]};

}

     {name:'Fase 2 — Introdução HIIT',weeks:'Sem 3–4',desc:'HIIT 2:1 — 2min leve / 1min sprint · 6 rounds.',sessions:['Terça · HIIT 2:1 · 6 rounds','Sábado · Contínuo 30min · 70%']},
     {name:'Fase 3 — Intensidade Jogo',weeks:'Sem 5–6',desc:'HIIT 8 rounds. Objetivo: 45min de society com conforto.',sessions:['Terça · HIIT 2:1 · 8 rounds','Sábado · Contínuo 40min · 75%']},
     {name:'Fase 4 — Simulação Completa',weeks:'Sem 7–8',desc:'60min de society com performance. Chega fresco, sai forte.',sessions:['Terça · HIIT misto 15s/15s · 10 rounds','Sábado · Contínuo 50min']},
    ].forEach((ph,i)=>{
      const active=i===phase,done=i<phase;
      html+=`<div class="card" style="margin-bottom:10px;${active?'border-color:var(--green);':''}${done?'opacity:.5;':''}">
        <div class="card-hdr">
          <div class="card-icon" style="background:rgba(61,204,132,.1);">${done?'✅':active?'▶':'🔒'}</div>
          <div style="flex:1"><div class="card-title">${ph.name}</div><div class="card-sub">${ph.weeks}</div></div>
          ${active?`<button class="btn-gold" style="padding:6px 12px;border-radius:6px;border:none;font-size:11px;font-weight:700;cursor:pointer;" onclick="advCardio()">→</button>`:''}
        </div>
        <div class="card-body">
          <div style="font-size:12px;color:var(--muted2);margin-bottom:8px;">${ph.desc}</div>
          ${ph.sessions.map(s=>`<div style="padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;color:var(--muted2);">· ${s}</div>`).join('')}
        </div>
      </div>`;
    });
  }

  c.innerHTML=html;
  renderFisioLog();
  const bxDate=document.getElementById('bx-date');
  if(bxDate)bxDate.value=new Date().toISOString().split('T')[0];
}

function saveBoxe(){
  if(!S.boxeLog)S.boxeLog=[];
  const b={id:Date.now(),date:document.getElementById('bx-date')?.value||new Date().toISOString().split('T')[0],week:document.getElementById('bx-week')?.value||'Sem 1',time:parseInt(document.getElementById('bx-time')?.value)||15,rating:parseFloat(document.getElementById('bx-rating')?.value)||6,notes:document.getElementById('bx-notes')?.value||''};
  S.boxeLog.unshift(b);save();render();toast('🥊','Sessão registrada!');
}
function advCardio(){S.cardioPhase=Math.min((S.cardioPhase||0)+1,3);save();render();toast('🏃','Fase concluída!');}

// ── TOAST ──
let tt;
function toast(icon,msg){const t=document.getElementById('toast');document.getElementById('ti').textContent=icon;document.getElementById('tm').textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2600);}

// ── INIT ──
render();
</script>
</body>
</html>
